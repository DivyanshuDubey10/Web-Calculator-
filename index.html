<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web Calculator</title>
    <style>
        body { 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            background-color: #e0e5ec; 
            font-family: Arial, sans-serif; 
            margin: 0;
        }
        .calculator { 
            background-color: #2c3e50; 
            padding: 20px; 
            border-radius: 20px; 
            box-shadow: 0px 10px 20px rgba(0,0,0,0.3); 
            width: 280px; 
        }
        #display { 
            width: 100%; 
            height: 60px; 
            background-color: #ecf0f1; 
            color: #2c3e50; 
            text-align: right; 
            font-size: 32px; 
            border: none; 
            border-radius: 10px; 
            margin-bottom: 20px; 
            padding-right: 15px; 
            box-sizing: border-box; 
        }
        .buttons { 
            display: grid; 
            grid-template-columns: repeat(4, 1fr); 
            gap: 12px; 
        }
        button { 
            padding: 20px; 
            font-size: 20px; 
            border: none; 
            border-radius: 10px; 
            cursor: pointer; 
            background-color: #ecf0f1; 
            font-weight: bold;
            transition: 0.2s;
        }
        button:hover { background-color: #bdc3c7; }
        button.operator { background-color: #e67e22; color: white; }
        button.operator:hover { background-color: #d35400; }
        button.clear { background-color: #e74c3c; color: white; grid-column: span 2; }
        button.clear:hover { background-color: #c0392b; }
        button.equal { background-color: #2ecc71; color: white; grid-column: span 2; }
        button.equal:hover { background-color: #27ae60; }
        .zero { grid-column: span 2; }
    </style>
</head>
<body>

    <div class="calculator">
        <input type="text" id="display" disabled>
        
        <div class="buttons">
            <button class="clear" onclick="clearDisplay()">C</button>
            <button class="operator" onclick="appendOperator('/')">÷</button>
            <button class="operator" onclick="appendOperator('*')">×</button>

            <button onclick="appendNumber('7')">7</button>
            <button onclick="appendNumber('8')">8</button>
            <button onclick="appendNumber('9')">9</button>
            <button class="operator" onclick="appendOperator('-')">-</button>

            <button onclick="appendNumber('4')">4</button>
            <button onclick="appendNumber('5')">5</button>
            <button onclick="appendNumber('6')">6</button>
            <button class="operator" onclick="appendOperator('+')">+</button>

            <button onclick="appendNumber('1')">1</button>
            <button onclick="appendNumber('2')">2</button>
            <button onclick="appendNumber('3')">3</button>
            
            <button onclick="appendNumber('0')" class="zero">0</button>
            <button onclick="appendNumber('.')">.</button>
            <button class="equal" onclick="calculate()">=</button>
        </div>
    </div>

    <script>
       
        const display = document.getElementById('display');

        function appendNumber(num) {
            display.value += num;
        }

        function appendOperator(op) {
            if(display.value !== '') {
                display.value += op;
            }
        }

        function clearDisplay() {
            display.value = '';
        }

        function calculate() {
            try {
                
                display.value = eval(display.value); 
            } catch (error) {
                display.value = 'Error';
            }
        }
    </script>
</body>
</html>
